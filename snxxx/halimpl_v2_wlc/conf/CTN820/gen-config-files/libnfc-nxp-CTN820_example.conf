#################### This file is used by NXP NFC NCI HAL #####################
###############################################################################
# Application options
# Logging Levels
# NXPLOG_DEFAULT_LOGLEVEL    0x01
# ANDROID_LOG_DEBUG          0x04
# ANDROID_LOG_INFO           0x03
# ANDROID_LOG_WARN           0x02
# ANDROID_LOG_ERROR          0x01
# ANDROID_LOG_SILENT         0x00
NXPLOG_EXTNS_LOGLEVEL=0x04
NXPLOG_NCIHAL_LOGLEVEL=0x04
NXPLOG_NCIX_LOGLEVEL=0x04
NXPLOG_NCIR_LOGLEVEL=0x04
NXPLOG_FWDNLD_LOGLEVEL=0x04
NXPLOG_TML_LOGLEVEL=0x04
NFC_DEBUG_ENABLED=1

###############################################################################
# Nfc Device Node name
NXP_NFC_DEV_NODE="/dev/nxp-nci"

###############################################################################
# Extension for Mifare reader enable
MIFARE_READER_ENABLE=0x00

###############################################################################
#set autonomous mode
# disable autonomous 0x00
# enable autonomous  0x01
NXP_AUTONOMOUS_ENABLE=0x00
###############################################################################
#set Guard Timer
# Guard Timer range to 0x0F-0xFF(i.e.15-255 seconds)
NXP_GUARD_TIMER_VALUE=0x0F
###############################################################################
#Enable SWP full power mode when phone is power off
#NXP_SWP_FULL_PWR_ON=0x00

###############################################################################
# Flashing Options Configurations
# FLASH_UPPER_VERSION 0x01
# FLASH_DIFFERENT_VERSION 0x02
# FLASH_ALWAYS 0x03
NXP_FLASH_CONFIG=0x01

###############################################################################
# Bail out mode
#  If set to 1, NFCC is using bail out mode for either Type A or Type B poll.
NFA_POLL_BAIL_OUT_MODE=0x01

###############################################################################
# Choose the presence-check algorithm for type-4 tag.  If not defined, the default value is 1.
# 0  NFA_RW_PRES_CHK_DEFAULT; Let stack selects an algorithm
# 1  NFA_RW_PRES_CHK_I_BLOCK; ISO-DEP protocol's empty I-block
# 2 NFA_RW_PRES_CHK_ISO_DEP_NAK; Type - 4 tag protocol iso-dep nak presence check
#    command is sent waiting for rsp and ntf.
PRESENCE_CHECK_ALGORITHM=2
###############################################################################
# Vendor Specific Proprietary Protocol & Discovery Configuration
# Set to 0xFF if unsupported
#  byte[0] NCI_PROTOCOL_18092_ACTIVE
#  byte[1] NCI_PROTOCOL_B_PRIME
#  byte[2] NCI_PROTOCOL_DUAL
#  byte[3] NCI_PROTOCOL_15693
#  byte[4] NCI_PROTOCOL_KOVIO
#  byte[5] NCI_PROTOCOL_MIFARE
#  byte[6] NCI_DISCOVERY_TYPE_POLL_KOVIO
#  byte[7] NCI_DISCOVERY_TYPE_POLL_B_PRIME
#  byte[8] NCI_DISCOVERY_TYPE_LISTEN_B_PRIME
#  byte[9] CHINESE_TAG_ID
#Note 0xFF set as per AndroidOne config value
NFA_PROPRIETARY_CFG={05, FF, FF, 06, 81, 80, 70, FF, FF, 8B}

###############################################################################
#NXP_CN_TRANSIT_BLK_NUM_CHECK_ENABLE
#Enable/Disable block number checks for china transit use case
#Enable  0x01
#Disable  0x00
#NXP_CN_TRANSIT_BLK_NUM_CHECK_ENABLE=0x01

###############################################################################
#NXP_MIFARE_MUTE_TO_RATS_ENABLE
#Enable/Disable Mute To RATS
#Enable   0x01 NFCC stays mute on RATS command when configured with
#              a non ISODEP SAK
#Disable  0x00
#NXP_MIFARE_MUTE_TO_RATS_ENABLE=0x01

################################################################################
#This flags will enable different modes of Lx Debug based on bits of the Byte0
#Byte 0:
# |_________Bit Mask_______|   Debug Mode
#  b7|b6|b5|b4|b3|b2|b1|b0|
#    |  |x |  |  |  |  |  |    Modulation Detected Notification
#    |  |  |X |  |  |  |  |    Enable L1 Events (ISO14443-4, ISO18092)
#    |  |  |  |X |  |  |  |    Enable L2 Reader Events(ROW specific)
#    |  |  |  |  |X |  |  |    Enable Felica SystemCode
#    |  |  |  |  |  |X |  |    Enable Felica RF (all Felica CM events)
#    |  |  |  |  |  |  |X |    Enable L2 Events CE (ISO14443-3, RF Field ON/OFF)
#Byte 1: RFU, shall always be 0x00
#                              Byte1    Byte0
#                                  \__ __/
# e.g. NXP_CORE_PROP_SYSTEM_DEBUG=0x0031 ==> Modulation detected, L1, L2 CE
NXP_CORE_PROP_SYSTEM_DEBUG=0x0000

###############################################################################
# Firmware file type
#.so file   0x01
#.bin file  0x02
NXP_FW_TYPE=0x01
############################################################################
# Extended APDU length for ISO_DEP
ISO_DEP_MAX_TRANSCEIVE=0xFEFF
###############################################################################
## Time to wait by DH when NFCC will report eSE Cold Temp Error.
# The value is as per the UM and in seconds
NXP_SE_COLD_TEMP_ERROR_DELAY=0x05

###############################################################################
# Set configuration optimization decision setting
# Enable    = 0x01
# Disable   = 0x00
NXP_SET_CONFIG_ALWAYS=0x00

###############################################################################
#WLC mode
#0x00 = if WLC Application running in MW (non-autonomous mode)
#0x01 = if WLC Application running in FW (autonomous mode)
NXP_WLC_MODE=0x01

###############################################################################
#SCR Read Tag Operation Timeout in secs
NXP_SWP_RD_TAG_OP_TIMEOUT=20

##############################################################################
# Deactivate notification wait time out in seconds used in ETSI Reader mode
# 0 - Infinite wait
NXP_DM_DISC_NTF_TIMEOUT=0

#################################################################################
# Core configuration extensions
# It includes
# Wired mode settings A0ED, A0EE
# Tag Detector A040, A041, A043
# Low Power mode A007
# Clock settings A002, A003
# PbF settings A008
# Clock timeout settings A004
# eSE (SVDD) PWR REQ settings A0F2
# Window size A0D8
# DWP Speed   A0D5
# How eSE connected to PN553 A012
# UICC2 bit rate A0D1
# SWP1A interface A0D4
# DWP intf behavior config, SVDD Load activated by default if set to 0x31 A037
# eSE reset notification A0F9
# Extended Action Ntf A096
# Enabling the Kovio feature A112
NXP_CORE_CONF_EXTN={20, 02, 15, 05,
    A0, EC, 01, 01,
    A0, ED, 01, 03,
    A0, F9, 01, 01,
    A0, 96, 01, 10,
    A1, 12, 01, 01
}
#       A0, F2, 01, 01,
#       A0, 40, 01, 01,
#       A0, 41, 01, 02,
#       A0, 43, 01, 04,
#       A0, 02, 01, 01,
#       A0, 03, 01, 11,
#       A0, 07, 01, 03,
#       A0, 08, 01, 01
#       }

###############################################################################
# Core configuration settings
# Below params are not recommended to add in CONF block.
# LA_BIT_FRAME_SDD(0x30)
# LA_PLATFORM_CONFIG(0x31)
# LA_SEL_INFO(0x32)
# LB_SENSB_INFO(0x38)
# LF_PROTOCOL(0x50)
# NFCC_CONFIG_CONTROL(0x85)

NXP_CORE_CONF={ 20, 02, 25, 0B,
        28, 01, 00,
        21, 01, 00,
        33, 04, 01, 02, 03, 04,
        54, 01, 06,
        5B, 01, 00,
        3E, 01, 00,
        80, 01, 01,
        81, 01, 01,
        82, 01, 0E,
        18, 01, 01,
        68, 01, 01
        }
###############################################################################
# Enable(0x01) or disable(0x00) non-standard tag reading
# Disable Non-standard card read         0x00
# Enable Non-standard card read          0x01
NXP_SUPPORT_NON_STD_CARD=0x00
#################################################################################
# Enable(0x01) or disable(0x00) iso dep sak merge
# Disable SAK merging         0x00
# Enable SAK merging          0x01
#Note 0x01 set as per AndroidOne config value
NXP_ISO_DEP_MERGE_SAK=0x01
#################################################################################
# Enable or Disable DCDC
# DCDC Off    0
# DCDC On     1
NXP_ENABLE_DCDC_ON=1
#################################################################################
# Extended Field Detect Mode
# Enable with CMA Events        0x03
# Enable without CMA events     0x01
# Disable                        0x00
# Note: It is not recommended to change values in production once it is fixed,
# It will lead to mismatch of event's for profiles
NXP_EXTENDED_FIELD_DETECT_MODE=0x00
#################################################################################
# Forcing HOST to listen for a selected protocol
# 0x00 : Disable Host Listen
# 0x01 : Enable Host to Listen (A)  for ISO-DEP tech A
# 0x02 : Enable Host to Listen (B)  for ISO-DEP tech B
# 0x04 : Enable Host to Listen (F)  for T3T Tag Type Protocol tech F
# 0x07 : Enable Host to Listen (ABF)for ISO-DEP tech AB & T3T Tag Type Protocol tech F
HOST_LISTEN_TECH_MASK=0x00

###############################################################################
# Auth cmd timeout in millisecond.
# The timeout value are multiplied by 10ms  and can be changed individually.
# byte[0] START_AUTH_CMD  timeout
# byte[1] TRANSCEIVE_CMD1 timeout
# byte[2] TRANSCEIVE_CMD2 timeout
# byte[3] default CMD     timeout
NXP_AUTH_TIMEOUT_CFG={03, 0A , 64 , 03}
#################################################################################
# Enable disable support for 4K FW download
# 0x00 = Disabled
# 0x01 = Enabled
NXP_4K_FWDNLD_SUPPORT=1
###############################################################################
# Observe mode required notifications based on below type
# All events CMA + Modulation Events       0x00
# Only Modulation events                   0x01
# Only CMA Events                          0x02
#NXP_OBSERVE_MODE_REQ_NOTIFICATION_TYPE=0x02
#################################################################################
# Enable or Disable Autonomous charging mode
# Autonomous mode enable  1 (Default)
# Autonomous mode disable 0
NXP_WLC_AUTONOMOUS_CHARGING_ENABLED=1
#################################################################################
# WLC One Point Configuration
# One Point Configuration disable 0 (Default)
# One Point Configuration enable  1
NXP_WLC_LPCD_ONE_POINT_CALIBRATION=0
#################################################################################
# Enable or Disable WLC BFOD (Background Foreign Object Detection)
# BFOD (Background Foreign Object Detection) disable 0 (Default)
# BFOD (Background Foreign Object Detection) enable  1
NXP_WLC_BFOD_ENABLED=0
#################################################################################
# WLC LPCD Configuration
# LPCD enable    1 (Default)
# LPCD disable   0
NXP_WLC_LPCD_EN_DIS_CFG=1
#################################################################################